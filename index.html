<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusPe Chat UI</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/style.css">

</head>


<body class="light">

<div class="app">

<div class="overlay"></div>

<!-- SIDEBAR -->

<aside class="sidebar">

<button class="new-chat">
<i class="fa fa-plus"></i> New Chat
</button>

<div class="chat-history">

<div class="history-item">Chat Example 1</div>
<div class="history-item">Chat Example 2</div>

</div>

<div class="profile">

<i class="fa fa-user-circle"></i>
User

</div>

</aside>


<!-- MAIN CHAT -->

<main class="chat">

<header class="chat-header">

<button class="hamburger">
<i class="fa fa-bars"></i>
</button>

<h5>CampusPe AI</h5>

<div class="header-actions">

<button id="darkMode">
<i class="fa fa-moon"></i>
</button>

<button id="exportChat">
<i class="fa fa-download"></i>
</button>

</div>

</header>


<section id="messages" class="messages">


<!-- WELCOME SCREEN -->

<div id="welcome" class="welcome">

<div class="welcome-icon">
<i class="fa fa-robot"></i>
</div>

<h2>Hello! How can I help you?</h2>

<div class="suggestions">

<div class="card suggestion">
<i class="fa fa-lightbulb"></i>
<h6>Ideas</h6>
<p>Generate creative ideas</p>
</div>

<div class="card suggestion">
<i class="fa fa-code"></i>
<h6>Code</h6>
<p>Help with coding</p>
</div>

<div class="card suggestion">
<i class="fa fa-book"></i>
<h6>Explain</h6>
<p>Explain any concept</p>
</div>

<div class="card suggestion">
<i class="fa fa-pen"></i>
<h6>Write</h6>
<p>Write content</p>
</div>

</div>

</div>


<!-- TYPING INDICATOR -->

<div id="typing" class="typing">

<span></span>
<span></span>
<span></span>

</div>


</section>


<!-- INPUT AREA -->

<footer class="input-area">

<div class="input-container">

<button class="attach">
<i class="fa fa-paperclip"></i>
</button>

<textarea id="input" placeholder="Send a message..."></textarea>

<button id="sendBtn" disabled>
<i class="fa fa-paper-plane"></i>
</button>

</div>

<p class="footer-text">
CampusPe AI may produce incorrect information.
</p>

</footer>

</main>

</div>


<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Chat Script -->
<script src="js/chat.js"></script>

</body>
</html>
